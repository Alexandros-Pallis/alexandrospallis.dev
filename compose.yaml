---
name: alexandrospallis-dev

services:
  php:
    restart: unless-stopped
    environment:
      APP_SECRET: ${APP_SECRET:-e0ba398f2ed7e1e7c0ec0e55d67c0723}
      SERVER_NAME: ${SERVER_NAME:-:8400}
      DEFAULT_URI: ${DEFAULT_URI:-https://apallis.local}
      MERCURE_PUBLISHER_JWT_KEY: ${CADDY_MERCURE_JWT_SECRET:-!ChangeThisMercureHubJWTSecretKey!}
      MERCURE_SUBSCRIBER_JWT_KEY: ${CADDY_MERCURE_JWT_SECRET:-!ChangeThisMercureHubJWTSecretKey!}
      DATABASE_URL: mysql://${DB_USERNAME}:${DB_PASSWORD:-1234}@${DB_HOST}:3306/${DB_NAME:-app}?serverVersion=mariadb-12.1.2&charset=utf8mb4
      # Run "composer require symfony/mercure-bundle" to install and configure the Mercure integration
      MERCURE_URL: ${CADDY_MERCURE_URL:-http://php:8400/.well-known/mercure}
      MERCURE_PUBLIC_URL: ${CADDY_MERCURE_PUBLIC_URL:-https://apallis.local/.well-known/mercure}
      MERCURE_JWT_SECRET: ${CADDY_MERCURE_JWT_SECRET:-!ChangeThisMercureHubJWTSecretKey!}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    expose:
      - "8400"
    networks:
      shared:
        aliases:
          - apallis

# Mercure is installed as a Caddy module, prevent the Flex recipe from installing another service
###> symfony/mercure-bundle ###
###< symfony/mercure-bundle ###

volumes:
  caddy_data:
  caddy_config:
###> symfony/mercure-bundle ###
###< symfony/mercure-bundle ###

networks:
  shared:
    external: true
